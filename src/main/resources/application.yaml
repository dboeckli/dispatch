---
spring:
  application:
    name: "dispatch"
  kafka:
    bootstrap-servers: "[::1]:9092"
    admin:
      properties:
        bootstrap.servers: "[::1]:9092"
      auto-create: false
    consumer:
      bootstrap-servers: "[::1]:9092"
      value-deserializer: "org.springframework.kafka.support.serializer.ErrorHandlingDeserializer"
      auto-offset-reset: "earliest"
      properties:
        spring.deserializer.value.delegate.class: "org.springframework.kafka.support.serializer.JsonDeserializer"
        spring.json.value.default.type: "dev.lydtech.dispatch.message.OrderCreated"
        spring.json.trusted.packages: "*"
        allow.auto.create.topics: false
  docker:
    compose:
      enabled: false
      stop:
        command: "down"
management:
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoints:
    access:
      default: "unrestricted"
    web:
      exposure:
        include: "*"
  endpoint:
    configprops:
      show-values: "ALWAYS"
    health:
      probes:
        enabled: true
      show-details: "always"
  info:
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
    git:
      enabled: true
      mode: "full"
  httpexchanges:
    recording:
      enabled: true
      include: "request_headers, response_headers, session_id, time_taken"
  observations:
    annotations:
      enabled: true
    http:
      server:
        requests:
          name: "http.server.requests"
      client:
        requests:
          name: "http-client-requests"
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    export:
      otlp:
        enabled: false
    sampling:
      probability: 1.0
  logging:
    export:
      enabled: false
      otlp:
        enabled: false
  simple:
    metrics:
      export:
        enabled: false
dispatch:
  stockServiceEndpoint: "http://localhost:8888/api/stock"
