---
spring:
  application:
    name: "dispatch"
  kafka:
    bootstrap-servers: "${spring.embedded.kafka.brokers}"
    admin:
      auto-create: false
      properties:
        bootstrap.servers: "${spring.embedded.kafka.brokers}"
    consumer:
      bootstrap-servers: "${spring.embedded.kafka.brokers}"
      properties:
        spring.json.trusted.packages: "*"
        allow.auto.create.topics: true
  docker:
    compose:
      enabled: false
      stop:
        command: "down"
      skip:
        in-tests: true
management:
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoints:
    access:
      default: "unrestricted"
    web:
      exposure:
        include: "*"
  endpoint:
    configprops:
      show-values: "ALWAYS"
    health:
      probes:
        enabled: true
      show-details: "always"
  info:
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
    git:
      enabled: true
      mode: "full"
  httpexchanges:
    recording:
      enabled: true
      include: "request_headers, response_headers, session_id, time_taken"
  observations:
    annotations:
      enabled: true
    http:
      server:
        requests:
          name: "http.server.requests"
      client:
        requests:
          name: "http-client-requests"
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    export:
      otlp:
        enabled: false
    sampling:
      probability: 1.0
  logging:
    export:
      enabled: false
      otlp:
        enabled: false
  simple:
    metrics:
      export:
        enabled: false
dispatch:
  stockServiceEndpoint: "http://localhost:7777/api/stock"
